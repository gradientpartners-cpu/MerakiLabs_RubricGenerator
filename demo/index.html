<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rubric Grader — demo console</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --ink: #1f2430;
    --muted: #6b7280;
    --line: #e3e6ea;
    --accent: #2563eb;
    --ok: #15803d;
    --ok-bg: #e9f6ee;
    --bad: #b91c1c;
    --bad-bg: #fbeaea;
    --warn: #92510a;
    --warn-bg: #fdf3e3;
    --code-bg: #f3f4f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 24px 28px 8px;
    max-width: 920px;
    margin: 0 auto;
  }
  header h1 { font-size: 20px; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0; }
  main { max-width: 920px; margin: 0 auto; padding: 12px 28px 64px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    margin: 14px 0;
  }
  .panel.locked { opacity: 0.55; }
  .panel-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .step-no {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .panel.locked .step-no { background: #c7ccd3; }
  .panel-head h2 { font-size: 15px; margin: 0; }
  .desc { color: var(--muted); margin: 2px 0 12px; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 7px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #c7ccd3; cursor: not-allowed; }
  button:not(:disabled):hover { background: #1d4ed8; }
  .pill {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }
  .pill.ok { background: var(--ok-bg); color: var(--ok); }
  .pill.bad { background: var(--bad-bg); color: var(--bad); }
  .pill.warn { background: var(--warn-bg); color: var(--warn); }
  .pill.neutral { background: var(--code-bg); color: var(--muted); }
  .captured {
    margin-top: 10px; font-size: 13px; color: var(--muted);
  }
  .captured code {
    background: var(--code-bg); padding: 2px 7px; border-radius: 5px;
    color: var(--ink); font-weight: 600;
  }
  .result { margin-top: 14px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 8px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  tr.flagged td { background: var(--bad-bg); }
  .quote { color: var(--ink); font-style: italic; }
  .kv { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 8px; }
  .kv > div { font-size: 13px; }
  .kv span.label { color: var(--muted); display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--muted); font-size: 12px; user-select: none; }
  pre {
    background: #0f172a; color: #e2e8f0; padding: 12px 14px; border-radius: 8px;
    overflow: auto; font-size: 12px; line-height: 1.45; margin-top: 8px; max-height: 320px;
  }
  .error {
    margin-top: 12px; background: var(--bad-bg); color: var(--bad);
    border: 1px solid #f0caca; border-radius: 7px; padding: 10px 12px; font-size: 13px;
  }
  .note { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .spin { color: var(--muted); font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>
<header>
  <h1>Rubric Grader — demo console</h1>
  <p>A thin demonstration console over the existing API at <code>http://localhost:5026</code>.
     Run the steps top to bottom; each feeds the next. Not the product frontend.</p>
</header>
<main id="app"></main>

<script>
"use strict";

const BASE = "http://localhost:5026";
const TENANT = "tenant-acme";
const USER = "manasa";

// All cross-step state lives here — no localStorage/sessionStorage by design.
const state = { rubricId: null, evalId: null };

// The built-in caught-hallucination transcript: t4 says the candidate coordinated a
// Postgres-failover rollback; the model will cite a fabricated "rebuilt the auth system"
// span that is NOT in any turn -> EvidenceNotFound -> composite withheld.
const DEMO_TRANSCRIPT = [
  { turnId: "t1", speaker: "interviewer", text: "Walk me through a system you owned end to end." },
  { turnId: "t2", speaker: "candidate", text: "I owned our billing pipeline for two years, from ingestion to invoicing." },
  { turnId: "t3", speaker: "interviewer", text: "How did you handle a major incident?" },
  { turnId: "t4", speaker: "candidate", text: "During a Postgres failover I coordinated the rollback and wrote the postmortem myself." },
  { turnId: "t5", speaker: "interviewer", text: "Tell me about scaling." },
  { turnId: "t6", speaker: "candidate", text: "We moved to a sharded cluster and cut p99 latency from 800ms to 300ms." }
];

const SAMPLE_JD =
  "Senior backend engineer with strong distributed systems experience.";

function headers(extra) {
  return Object.assign({ "Content-Type": "application/json", "X-Tenant-Id": TENANT }, extra || {});
}

async function call(method, path, body, extraHeaders) {
  const opts = { method, headers: headers(extraHeaders) };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  const text = await res.text();
  let json = null;
  try { json = text ? JSON.parse(text) : null; } catch (_) { json = null; }
  if (!res.ok) {
    const msg = (json && (json.error || json.title)) || text || ("HTTP " + res.status);
    throw new Error("HTTP " + res.status + " — " + msg);
  }
  return json;
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function rawBlock(obj) {
  return '<details><summary>Raw response</summary><pre>' +
    esc(JSON.stringify(obj, null, 2)) + '</pre></details>';
}

// RubricStatus enum is serialized as an integer on /jd and /approve (the /audit chain
// uses strings); map it back for display.
function rubricStatusName(status) {
  return ["Draft", "Approved"][status] ?? status;
}

// status -> pill class for validation outcomes
function statusPill(status) {
  const s = String(status);
  if (s === "Valid") return '<span class="pill ok">' + esc(s) + '</span>';
  if (s === "Abstained" || s === "LowConfidence") return '<span class="pill warn">' + esc(s) + '</span>';
  return '<span class="pill bad">' + esc(s) + '</span>'; // EvidenceNotFound, Errored
}

// ---- panel definitions ---------------------------------------------------------------

const steps = [
  {
    no: 1, id: "health", title: "Health", btn: "Check health",
    desc: "Confirms the server is up and reports which LLM + persistence backends are active.",
    run: async (out) => {
      const r = await call("GET", "/health");
      const ok = r && r.status === "ok";
      out.innerHTML =
        (ok ? '<span class="pill ok">server ok</span>' : '<span class="pill bad">not ok</span>') +
        '<div class="kv">' +
        '<div><span class="label">LLM backend</span>' + esc(r.llmBackend) + '</div>' +
        '<div><span class="label">Persistence</span>' + esc(r.persistence) + '</div>' +
        '</div>' + rawBlock(r);
    }
  },
  {
    no: 2, id: "generate", title: "Generate rubric (from a JD)", btn: "Generate draft",
    desc: "POST /jd with a sample job description. Returns a DRAFT rubric; note the fairness flag the generator raises for a human to weigh — it flags, never auto-drops.",
    run: async (out) => {
      const r = await call("POST", "/jd", { jobDescription: SAMPLE_JD });
      state.rubricId = r.rubric.id;
      refreshLocks();

      const crits = (r.rubric.criteria || []).map(c =>
        '<tr><td><code>' + esc(c.key) + '</code></td><td>' + esc(c.label) +
        '</td><td>' + esc(c.weight) + '</td></tr>').join("");

      const flags = (r.fairnessFlags || []);
      const flagHtml = flags.length
        ? flags.map(f => '<div class="error">Fairness flag: criterion <code>' +
            esc(f.criterionKey) + '</code> matched protected-attribute term <strong>"' +
            esc(f.matchedTerm) + '"</strong> — surfaced for the human approver, not removed.</div>').join("")
        : '<div class="note">No fairness flags.</div>';

      out.innerHTML =
        '<span class="pill neutral">' + esc(rubricStatusName(r.rubric.status)) + '</span>' +
        '<table><thead><tr><th>Criterion</th><th>Label</th><th>Weight</th></tr></thead><tbody>' +
        crits + '</tbody></table>' + flagHtml +
        '<div class="captured">Captured rubric id: <code>' + esc(state.rubricId) + '</code></div>' +
        rawBlock(r);
    }
  },
  {
    no: 3, id: "approve", title: "Approve the draft", btn: "Approve rubric",
    needs: () => state.rubricId, needsMsg: "Run step 2 first to generate a rubric.",
    desc: "POST /rubrics/{id}/approve with the captured id. Freezes the draft into an immutable approved version and records who approved it (audited).",
    run: async (out) => {
      const r = await call("POST", "/rubrics/" + encodeURIComponent(state.rubricId) + "/approve",
        undefined, { "X-User-Id": USER });
      out.innerHTML =
        '<span class="pill ok">' + esc(rubricStatusName(r.rubric.status)) + '</span>' +
        '<div class="kv">' +
        '<div><span class="label">Rubric id</span><code>' + esc(r.rubric.id) + '</code></div>' +
        '<div><span class="label">Version</span>' + esc(r.rubric.version) + '</div>' +
        '<div><span class="label">Approved by</span>' + esc(r.rubric.approvedBy) + '</div>' +
        '</div>' + rawBlock(r);
    }
  },
  {
    no: 4, id: "grade", title: "Grade a transcript", btn: "Grade transcript",
    desc: "POST /evaluations grades a transcript against the pre-seeded approved rubric " +
          "<code>rub-backend-screen-v3</code> (a separate flow from the generated rubric above). " +
          "Runs the pipeline inline and captures the evaluation id.",
    run: async (out) => {
      const r = await call("POST", "/evaluations", {
        rubricVersionId: "rub-backend-screen-v3",
        artifactId: "artifact-7731",
        turns: DEMO_TRANSCRIPT
      });
      state.evalId = r.id;
      refreshLocks();
      const stateName = ["Queued", "Graded", "NeedsHumanGrading", "Failed"][r.state] ?? r.state;
      const composite = r.compositeScore == null
        ? '<span class="pill bad">withheld (null)</span>'
        : '<span class="pill ok">' + esc(r.compositeScore) + '</span>';
      out.innerHTML =
        '<div class="kv">' +
        '<div><span class="label">State</span>' +
          (stateName === "Graded" ? '<span class="pill ok">' : '<span class="pill warn">') +
          esc(stateName) + '</span></div>' +
        '<div><span class="label">Composite</span>' + composite + '</div>' +
        '</div>' +
        '<div class="note">A criterion cited a span absent from the transcript, so its score was ' +
        'dropped and the composite withheld. The per-criterion detail is in step 5.</div>' +
        '<div class="captured">Captured evaluation id: <code>' + esc(state.evalId) + '</code></div>' +
        rawBlock(r);
    }
  },
  {
    no: 5, id: "audit", title: "Audit the grade", btn: "Load audit chain",
    needs: () => state.evalId, needsMsg: "Run step 4 first to grade a transcript.",
    desc: "GET /applications/{id}/audit reconstructs the decision: every criterion, its cited quote, the turn it came from, and the validation status — the caught hallucination shows in red.",
    run: async (out) => {
      const r = await call("GET", "/applications/" + encodeURIComponent(state.evalId) + "/audit");
      const rows = (r.criteria || []).map(c => {
        const bad = String(c.validationStatus) !== "Valid";
        return '<tr' + (bad ? ' class="flagged"' : '') + '>' +
          '<td>' + esc(c.label || c.criterionKey) + '</td>' +
          '<td>' + (c.score == null ? '<span class="pill bad">dropped</span>' : esc(c.score)) + '</td>' +
          '<td class="quote">' + (c.evidenceSpan ? '"' + esc(c.evidenceSpan) + '"' : '—') + '</td>' +
          '<td>' + esc(c.evidenceTurnId || '—') + '</td>' +
          '<td>' + statusPill(c.validationStatus) + '</td></tr>';
      }).join("");
      const composite = r.compositeScore == null
        ? '<span class="pill bad">withheld (null)</span>'
        : '<span class="pill ok">' + esc(r.compositeScore) + '</span>';
      out.innerHTML =
        '<div class="kv">' +
        '<div><span class="label">State</span><span class="pill warn">' + esc(r.state) + '</span></div>' +
        '<div><span class="label">Composite</span>' + composite + '</div>' +
        '<div><span class="label">Rubric version</span><code>' + esc(r.rubricVersion.id) + '</code></div>' +
        '<div><span class="label">Model</span>' + esc(r.modelId) + '</div>' +
        '</div>' +
        '<table><thead><tr><th>Criterion</th><th>Score</th><th>Cited quote</th><th>Turn</th><th>Status</th></tr></thead><tbody>' +
        rows + '</tbody></table>' +
        '<div class="note">The LLM never computes the composite — code does, from validated ' +
        'per-criterion scores only. Any EvidenceNotFound drops that score and withholds the composite.</div>' +
        rawBlock(r);
    }
  },
  {
    no: 6, id: "fairness", title: "Fairness — four-fifths rule", btn: "Run adverse-impact check",
    desc: "GET /fairness/adverse-impact runs the 80%-rule check over seeded synthetic data. A group selected below 80% of the top group's rate is flagged (in red).",
    run: async (out) => {
      const r = await call("GET", "/fairness/adverse-impact");
      const rows = (r.groups || []).map(g =>
        '<tr' + (g.flagged ? ' class="flagged"' : '') + '>' +
        '<td>' + esc(g.group) + '</td>' +
        '<td>' + esc(g.selected) + ' / ' + esc(g.total) + '</td>' +
        '<td>' + (g.selectionRate * 100).toFixed(1) + '%</td>' +
        '<td>' + (g.impactRatio * 100).toFixed(1) + '%</td>' +
        '<td>' + (g.flagged ? '<span class="pill bad">flagged</span>' : '<span class="pill ok">ok</span>') + '</td>' +
        '</tr>').join("");
      out.innerHTML =
        (r.anyFlagged ? '<span class="pill bad">adverse impact detected</span>'
                      : '<span class="pill ok">no adverse impact</span>') +
        ' <span class="pill neutral">' + esc(r.rule) + '</span>' +
        '<table><thead><tr><th>Group</th><th>Selected</th><th>Selection rate</th><th>Impact ratio</th><th>Four-fifths</th></tr></thead><tbody>' +
        rows + '</tbody></table>' +
        '<div class="note">' + esc(r.dataSource) + '</div>' +
        rawBlock(r);
    }
  }
];

// ---- rendering + wiring --------------------------------------------------------------

const app = document.getElementById("app");

steps.forEach(step => {
  const panel = document.createElement("section");
  panel.className = "panel";
  panel.id = "panel-" + step.id;
  panel.innerHTML =
    '<div class="panel-head"><span class="step-no">' + step.no + '</span><h2>' + esc(step.title) + '</h2></div>' +
    '<p class="desc">' + step.desc + '</p>' +
    '<button id="btn-' + step.id + '">' + esc(step.btn) + '</button>' +
    '<div class="lockmsg note" id="lock-' + step.id + '" style="display:none"></div>' +
    '<div class="out" id="out-' + step.id + '"></div>';
  app.appendChild(panel);

  const btn = panel.querySelector("#btn-" + step.id);
  const out = panel.querySelector("#out-" + step.id);
  btn.addEventListener("click", async () => {
    btn.disabled = true;
    out.innerHTML = '<div class="spin">Running…</div>';
    try {
      await step.run(out);
    } catch (e) {
      out.innerHTML = '<div class="error">' + esc(e.message) +
        '<div class="note">Is the server running on ' + BASE + '? Start it with ' +
        '<code>dotnet run --project RubricGrader</code>.</div></div>';
    } finally {
      refreshLocks(); // re-evaluate this and downstream buttons
    }
  });
});

// Enable/disable each step's button based on its prerequisite.
function refreshLocks() {
  steps.forEach(step => {
    const btn = document.getElementById("btn-" + step.id);
    const lock = document.getElementById("lock-" + step.id);
    const panel = document.getElementById("panel-" + step.id);
    const ready = !step.needs || step.needs();
    btn.disabled = !ready;
    panel.classList.toggle("locked", !ready);
    if (!ready) { lock.style.display = ""; lock.textContent = step.needsMsg; }
    else { lock.style.display = "none"; }
  });
}

refreshLocks();
</script>
</body>
</html>
